<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="sq">
      <rect width="512" height="512" rx="114" ry="114"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="114" fill="#f4ede1"/>

  <g clip-path="url(#sq)">
    <!-- Lu stamp (blue) -->
    <circle cx="193" cy="216" r="128" fill="#2A6FDB"/>

    <!-- Fa stamp (terracotta, multiply blend over blue) -->
    <!-- Non-overlapping terracotta area -->
    <circle cx="319" cy="296" r="128" fill="#D97757" style="mix-blend-mode:multiply"/>

    <!-- Text -->
    <text x="108" y="274" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="158" fill="#f4ede1" letter-spacing="-2">Lu</text>
    <text x="248" y="346" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="158" fill="#f4ede1" letter-spacing="-2">Fa</text>

    <!-- Corner labels -->
    <text x="338" y="54" font-family="'Courier New', monospace" font-size="19"
          fill="#a39989" letter-spacing="2">No. 001</text>
    <text x="50" y="464" font-family="'Courier New', monospace" font-size="19"
          fill="#a39989" letter-spacing="2">Two readers</text>
  </g>
</svg>
